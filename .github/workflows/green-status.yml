name: Green Status

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail: true

  green-status:
    needs: secret-scan
    runs-on: ubuntu-latest
    name: "Green Status"
    env:
      STORE_PATH: ""
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm exec prettier --check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: pnpm run build
        
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: E2E Tests
        run: pnpm test:e2e

      - name: Forensic Verify
        run: >
          pnpm exec tsx scripts/forensic-verify.ts
          --manifest=.translation-control/manifests/manifest.jsonl
          --inventory=.translation-control/inventory.jsonl
          --fail-on-mismatch

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: green-status-evidence
          path: |
            playwright-report/
            test-results/
          retention-days: 7
